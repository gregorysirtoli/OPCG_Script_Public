name: Run Prediction Daily

on:
  workflow_dispatch:
  schedule:
    # 19:00 Europe/Rome = 17:00 UTC during CEST
    - cron: "0 17 * * *"

jobs:
  predict-and-store:
    runs-on: ubuntu-24.04

    env:
      PYTHONUNBUFFERED: "1"
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      MONGODB_DB: ${{ secrets.MONGODB_DB }}
      EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore trained artifacts
        uses: actions/cache@v4
        with:
          path: artifacts
          key: optcg-artifacts-${{ github.run_id }}
          restore-keys: |
            optcg-artifacts-

      - name: Ensure model artifacts exist
        run: |
          if [ ! -f artifacts/optcg_quantile_artifacts.joblib ]; then
            echo "Missing artifacts/optcg_quantile_artifacts.joblib. Run mlTrain workflow first."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r src/prediction/requirements.txt

      - name: Run daily predictions
        run: |
          python -m src.prediction.run_predict
