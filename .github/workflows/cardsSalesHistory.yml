name: Run PSA Cards Sales History

on:
  workflow_dispatch:
  #schedule:
  #  # Alle 14:00 italiane (12:00 UTC)
  #  - cron: "0 12 * * *"

jobs:
  run-cards-sales-history:
    runs-on: ubuntu-24.04

    env:
      PYTHONUNBUFFERED: "1"
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      MONGODB_DB: ${{ secrets.MONGODB_DB }}
      MONGODB_SALES_URI: ${{ secrets.MONGODB_SALES_URI }}
      MONGODB_SALES_DB: ${{ secrets.MONGODB_SALES_DB }}
      PSA_COOKIE: ${{ secrets.PSA_COOKIE }}
      EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}

      # Private providers modules
      CARDS_SALES_HISTORY_MODULE: private_providers.cardsSalesHistory

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Checkout private providers repo
        uses: actions/checkout@v4
        with:
          repository: gregorysirtoli/OPCG_Script_Private
          token: ${{ secrets.PROVIDERS_TOKEN }}
          path: private_providers

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Cards Sales History
        run: python -m src.metrics.getCardsSalesHistory
