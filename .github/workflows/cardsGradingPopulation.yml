name: Run PSA Cards Grading Population

on:
  workflow_dispatch:
  schedule:
    # Weekly at 23:00 Sunday America/New_York during DST (03:00 UTC Monday, 05:00 Monday Italia CEST / 04:00 Monday Italia CET)
    - cron: "0 3 * * 1"

jobs:
  run-cards-grading-population:
    runs-on: ubuntu-24.04

    env:
      PYTHONUNBUFFERED: "1"
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      MONGODB_DB: ${{ secrets.MONGODB_DB }}
      PSA_COOKIE: ${{ secrets.PSA_COOKIE }}
      EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}

      # Modulo provider privato
      CARDS_GRADING_POPULATION_MODULE: private_providers.cardsGradingPopulation

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Checkout private providers repo
        uses: actions/checkout@v4
        with:
          repository: gregorysirtoli/OPCG_Script_Private
          token: ${{ secrets.PROVIDERS_TOKEN }}
          path: private_providers

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Cards Grading Population
        run: python -m src.metrics.getCardsGradingPopulation
