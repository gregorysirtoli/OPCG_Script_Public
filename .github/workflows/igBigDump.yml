name: IG - Big Dump Generation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 5"

jobs:
  generate-big-dump:
    runs-on: ubuntu-24.04

    env:
      PYTHONUNBUFFERED: "1"
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      MONGODB_DB: ${{ secrets.MONGODB_DB }}
      GOOGLE_CLOUD_STORAGE_BUCKET: ${{ secrets.GOOGLE_CLOUD_STORAGE_BUCKET }}
      GOOGLE_CLOUD_STORAGE_SERVICE_ACCOUNT_B64: ${{ secrets.GOOGLE_CLOUD_STORAGE_SERVICE_ACCOUNT_B64 }}
      INSTAGRAM_POST_INITIAL_STATUS: draft
      EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Checkout private providers repo
        uses: actions/checkout@v4
        with:
          repository: gregorysirtoli/OPCG_Script_Private
          token: ${{ secrets.PROVIDERS_TOKEN }}
          path: private_providers

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate Big Dump Post
        run: |
          python -m src.instagram.big_dump
